env:
  TERM: alacritty

colors:
  primary:
    background: "#1e2127"
    foreground: "#d8dee9"

window:
  opacity: 0.95
  padding:
    x: 10
    y: 10
  decorations: buttonless # macOS only
  dimensions:
    columns: 140
    lines: 40

startup_mode: Windowed

draw_bold_text_with_bright_colors: true

live_confgi_reload: true

scrolling:
  history: 10000
  multiplier: 10

cursor:
  style:
    shape: Underline
    blinking: Always
